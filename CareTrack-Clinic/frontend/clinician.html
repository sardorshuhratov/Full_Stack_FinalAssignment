<!doctype html>
<html lang="uz">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="CareTrack Clinic - Klinitsist paneli">
    <title>CareTrack Clinic | Klinitsist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body data-page-role="clinician">
    <div class="app-layout">
      <!-- Hamburger Toggle (Mobile) -->
      <button class="sidebar-toggle" id="sidebarToggle" type="button">
        <i class="bi bi-list"></i>
      </button>

      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
          <h4><i class="bi bi-heart-pulse me-2"></i>CareTrack</h4>
          <small>Klinitsist</small>
        </div>
        <nav class="sidebar-nav nav flex-column side-menu">
          <a class="nav-link active" href="#patientsSection"><i class="bi bi-person-lines-fill"></i> Bemorlar</a>
          <a class="nav-link" href="#diagnosesSection"><i class="bi bi-clipboard2-pulse"></i> Tashxislar</a>
        </nav>
        <div class="sidebar-footer">
          <div class="user-info">
            <div class="user-avatar" id="userAvatar">D</div>
            <div>
              <div class="user-name" id="userLabel">Doktor</div>
              <div class="user-role">Klinitsist</div>
            </div>
          </div>
          <button id="logoutButton" class="btn btn-outline-danger btn-sm w-100" type="button">
            <i class="bi bi-box-arrow-left me-1"></i>Chiqish
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="dashboard-main">
        <div class="page-header">
          <div>
            <p class="eyebrow">Klinitsist paneli</p>
            <h1>Klinik yozuvlar</h1>
          </div>
          <button id="refreshButton" class="btn btn-outline-primary btn-sm" type="button">
            <i class="bi bi-arrow-clockwise me-1"></i>Yangilash
          </button>
        </div>

        <div id="messageBox" class="alert d-none"></div>

        <!-- Doktor profili -->
        <section id="clinicianProfile"></section>

        <!-- Statistika -->
        <section class="stats-grid">
          <div class="stat-card">
            <span class="stat-label"><i class="bi bi-person-lines-fill me-1"></i>Mening bemorlarim</span>
            <strong class="stat-value" id="patientsCount">0</strong>
          </div>
          <div class="stat-card accent">
            <span class="stat-label"><i class="bi bi-clipboard2-pulse me-1"></i>Mening tashxislarim</span>
            <strong class="stat-value" id="diagnosesCount">0</strong>
          </div>
        </section>

        <!-- Bo'limlar -->
        <section id="patientsSection" class="panel"></section>
        <section id="diagnosesSection" class="panel d-none"></section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/dashboard.js"></script>
  </body>
</html>
